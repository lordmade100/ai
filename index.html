<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Service - Motion Ad</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700;900&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: #050505;
            color: #fff;
            overflow: hidden; /* Lock scroll for a pure hero experience */
        }

        /* --- HERO CONTAINER --- */
        .hero {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at center, #1a1511 0%, #050505 80%);
            perspective: 1000px;
            overflow: hidden;
        }

        /* --- PARALLAX LAYERS --- */
        .layer-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none; /* Let mouse events pass through to the document */
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .parallax-item {
            position: absolute;
            will-change: transform;
            transition: transform 0.1s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        /* Background floating elements (Blurred, slow) */
        .item-bg-1 {
            width: 150px;
            top: 15%;
            left: 10%;
            filter: blur(8px) drop-shadow(0 10px 15px rgba(0,0,0,0.8));
            opacity: 0.4;
        }

        .item-bg-2 {
            width: 200px;
            bottom: 20%;
            right: 15%;
            filter: blur(5px) drop-shadow(0 10px 15px rgba(0,0,0,0.8));
            opacity: 0.6;
        }

        /* Midground main element (Sharp, follows mouse moderately) */
        .item-main {
            width: 450px;
            filter: drop-shadow(0 30px 40px rgba(0,0,0,0.95));
            z-index: 10;
        }

        /* Foreground floating element (Very blurred, moves fast) */
        .item-fg {
            width: 300px;
            bottom: -5%;
            left: 20%;
            filter: blur(12px) drop-shadow(0 20px 20px rgba(0,0,0,0.9));
            opacity: 0.8;
            z-index: 20;
        }

        /* --- AD TEXT CONTENT --- */
        .content {
            position: relative;
            z-index: 15; /* Sits between the main image and foreground */
            text-align: center;
            pointer-events: auto;
        }

        .content h1 {
            font-size: 5rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 4px;
            background: linear-gradient(45deg, #f5d061, #e6a32e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
            text-shadow: 0px 15px 30px rgba(0,0,0,0.8);
        }

        .content p {
            font-size: 1.5rem;
            font-weight: 300;
            color: #d4d4d4;
            letter-spacing: 2px;
            margin-bottom: 40px;
            text-shadow: 0px 5px 15px rgba(0,0,0,0.9);
        }

        .cta-btn {
            background: transparent;
            color: #f5d061;
            border: 2px solid #f5d061;
            padding: 15px 40px;
            font-size: 1.2rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(5px);
        }

        .cta-btn:hover {
            background: #f5d061;
            color: #050505;
            box-shadow: 0 0 30px rgba(245, 208, 97, 0.4);
            transform: translateY(-5px);
        }

        /* --- LIGHTING EFFECTS --- */
        .glow {
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(230, 163, 46, 0.15) 0%, transparent 70%);
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 1;
        }

        /* --- MOBILE RESPONSIVENESS --- */
        @media (max-width: 768px) {
            .content h1 { font-size: 3rem; }
            .content p { font-size: 1rem; }
            .item-main { width: 300px; }
            .item-bg-1, .item-bg-2, .item-fg { display: none; /* Simplify on mobile */ }
        }
    </style>
</head>
<body>

    <main class="hero">
        <div class="glow" id="mouse-glow"></div>

        <!-- Parallax Background -->
        <div class="layer-container">
            <img src="https://i.postimg.cc/X77SQ5mk/steward-icon.png" alt="Steward Icon" class="parallax-item item-bg-1" data-speed="-2">
            <img src="https://i.postimg.cc/X77SQ5mk/steward-icon.png" alt="Steward Icon" class="parallax-item item-bg-2" data-speed="1.5">
        </div>

        <!-- Ad Text -->
        <div class="content parallax-item" data-speed="0.5">
            <h1>At Your Service</h1>
            <p>The gold standard, delivered perfectly.</p>
            <button class="cta-btn">Experience Now</button>
        </div>

        <!-- Parallax Midground (Main focus) -->
        <div class="layer-container">
            <img src="https://i.postimg.cc/X77SQ5mk/steward-icon.png" alt="Steward Icon" class="parallax-item item-main" data-speed="3">
        </div>

        <!-- Parallax Foreground -->
        <div class="layer-container">
            <img src="https://i.postimg.cc/X77SQ5mk/steward-icon.png" alt="Steward Icon" class="parallax-item item-fg" data-speed="6">
        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const parallaxItems = document.querySelectorAll('.parallax-item');
            const glow = document.getElementById('mouse-glow');
            const hero = document.querySelector('.hero');

            // Variables for smooth interpolation (Lerping)
            let mouseX = 0;
            let mouseY = 0;
            let currentX = 0;
            let currentY = 0;

            // Track mouse movement
            hero.addEventListener('mousemove', (e) => {
                // Calculate mouse position relative to the center of the screen
                mouseX = (e.clientX - window.innerWidth / 2);
                mouseY = (e.clientY - window.innerHeight / 2);
                
                // Move the ambient glow instantly with the cursor
                glow.style.transform = `translate(calc(-50% + ${mouseX * 0.2}px), calc(-50% + ${mouseY * 0.2}px))`;
            });

            // Animation loop for smooth parallax effect
            function animate() {
                // Lerp formula: current = current + (target - current) * ease
                currentX += (mouseX - currentX) * 0.1;
                currentY += (mouseY - currentY) * 0.1;

                parallaxItems.forEach(item => {
                    const speed = parseFloat(item.getAttribute('data-speed'));
                    // Calculate movement based on the item's specific speed attribute
                    const x = (currentX * speed) / 100;
                    const y = (currentY * speed) / 100;

                    // Apply the translation
                    item.style.transform = `translate(${x}px, ${y}px)`;
                });

                requestAnimationFrame(animate);
            }

            // Start the animation loop
            animate();

            // Reset positions gently if the mouse leaves the window
            document.addEventListener('mouseleave', () => {
                mouseX = 0;
                mouseY = 0;
                glow.style.transform = `translate(-50%, -50%)`;
            });
        });
    </script>
</body>
</html>
