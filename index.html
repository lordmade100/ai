<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consultant Dashboard | Rare Grade Tech</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/feather-icons"></script>
    <style>
        :root {
            --bg-main: #F0F4F9;
            --white: #FFFFFF;
            --brand-blue: #0611B1;
            --text-primary: #1F1F1F;
            --text-secondary: #444746;
            --border: #E3E3E3;
            --success: #34a853;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'DM Sans', sans-serif; background: var(--bg-main); color: var(--text-primary); display: flex; height: 100vh; }

        /* Queue Sidebar */
        .queue-sidebar { width: 350px; background: var(--white); border-right: 1px solid var(--border); display: flex; flex-direction: column; }
        .sidebar-header { padding: 20px; border-bottom: 1px solid var(--border); background: var(--brand-blue); color: white; }
        .queue-list { flex: 1; overflow-y: auto; padding: 10px; }
        
        .queue-item { 
            padding: 15px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 10px; 
            cursor: pointer; transition: all 0.2s; background: var(--white);
        }
        .queue-item:hover { border-color: var(--brand-blue); background: #f8f9ff; }
        .queue-item.active { border-color: var(--brand-blue); background: #f0f2ff; box-shadow: 0 4px 12px rgba(6,17,177,0.1); }
        .queue-item h4 { font-size: 0.95rem; margin-bottom: 4px; }
        .queue-item p { font-size: 0.8rem; color: var(--text-secondary); }
        .status-tag { display: inline-block; padding: 2px 8px; border-radius: 50px; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; margin-top: 8px; }
        .status-tag.pending { background: #fff4e5; color: #b76e00; }
        .status-tag.active { background: #e6f4ea; color: #1e7e34; }

        /* Chat Window */
        .chat-window { flex: 1; display: flex; flex-direction: column; background: var(--white); }
        .chat-header { padding: 15px 25px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .messages-area { flex: 1; overflow-y: auto; padding: 20px; background: #fafafa; display: flex; flex-direction: column; gap: 10px; }
        
        .msg { padding: 10px 15px; border-radius: 12px; max-width: 70%; font-size: 0.9rem; }
        .msg.consultant { align-self: flex-end; background: var(--brand-blue); color: white; border-bottom-right-radius: 2px; }
        .msg.user { align-self: flex-start; background: var(--border); color: var(--text-primary); border-bottom-left-radius: 2px; }

        .input-area { padding: 20px; border-top: 1px solid var(--border); display: flex; gap: 10px; }
        .input-area input { flex: 1; padding: 12px 20px; border-radius: 50px; border: 1px solid var(--border); outline: none; }
        .btn { padding: 10px 25px; border-radius: 50px; border: none; cursor: pointer; font-weight: 600; font-family: inherit; transition: 0.2s; }
        .btn-primary { background: var(--brand-blue); color: white; }
        .btn-success { background: var(--success); color: white; }

        .empty-state { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--text-muted); }
    </style>
</head>
<body>

    <div class="queue-sidebar">
        <div class="sidebar-header">
            <h2>Live Queue</h2>
            <p>Rare Grade Tech Support</p>
        </div>
        <div class="queue-list" id="queueList">
            </div>
    </div>

    <div class="chat-window" id="chatWindow">
        <div class="empty-state" id="emptyState">
            <i data-feather="message-circle" style="width: 48px; height: 48px; margin-bottom: 10px;"></i>
            <p>Select a request from the queue to start chatting</p>
        </div>

        <div id="activeChatUI" style="display: none; flex-direction: column; height: 100%;">
            <div class="chat-header">
                <div>
                    <h3 id="clientNameHeader">Client Name</h3>
                    <p id="chatStatusHeader" style="font-size: 0.8rem; color: var(--success);">Pending Acceptance</p>
                </div>
                <button class="btn btn-success" id="acceptBtn" onclick="window.acceptChat()">Accept Request</button>
            </div>
            <div class="messages-area" id="consultantMessagesList"></div>
            <div class="input-area">
                <input type="text" id="consultantInput" placeholder="Type your response..." onkeypress="window.handleKey(event)">
                <button class="btn btn-primary" onclick="window.sendResponse()">Send</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, update, push, serverTimestamp, onChildAdded } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // Firebase Config (Must match your index.html)
        const firebaseConfig = {
            apiKey: "AIzaSyBOyZ3As4GTuNvjemvPF_SpsC6m6vqtNhc",
            authDomain: "fire-b-a8878.firebaseapp.com",
            projectId: "fire-b-a8878",
            databaseURL: "https://fire-b-a8878-default-rtdb.firebaseio.com",
            appId: "1:658673187627:web:6e4c29af661785f0afa36e"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let selectedSessionId = null;
        const consultantName = "Rare Grade Tech Specialist"; //

        // 1. Listen for all live chat sessions
        onValue(ref(db, 'live_chats'), (snapshot) => {
            const queueList = document.getElementById('queueList');
            queueList.innerHTML = '';
            
            snapshot.forEach((child) => {
                const session = child.val();
                const id = child.key;
                
                const item = document.createElement('div');
                item.className = `queue-item ${selectedSessionId === id ? 'active' : ''}`;
                item.innerHTML = `
                    <h4>${session.userName}</h4>
                    <p>Started: ${new Date(session.createdAt).toLocaleTimeString()}</p>
                    <span class="status-tag ${session.status}">${session.status}</span>
                `;
                item.onclick = () => window.selectSession(id, session);
                queueList.appendChild(item);
            });
        });

        window.selectSession = (id, session) => {
            selectedSessionId = id;
            document.getElementById('emptyState').style.display = 'none';
            document.getElementById('activeChatUI').style.display = 'flex';
            document.getElementById('clientNameHeader').innerText = session.userName;
            document.getElementById('consultantMessagesList').innerHTML = '';
            
            const acceptBtn = document.getElementById('acceptBtn');
            if (session.status === 'active') {
                acceptBtn.style.display = 'none';
                document.getElementById('chatStatusHeader').innerText = "Connected";
            } else {
                acceptBtn.style.display = 'block';
                document.getElementById('chatStatusHeader').innerText = "Awaiting Acceptance";
            }

            // Load messages for this session
            window.listenForMessages(id);
        };

        window.acceptChat = async () => {
            if (!selectedSessionId) return;
            await update(ref(db, `live_chats/${selectedSessionId}`), {
                status: 'active',
                consultantName: consultantName
            });
            document.getElementById('acceptBtn').style.display = 'none';
        };

        window.sendResponse = async () => {
            const input = document.getElementById('consultantInput');
            const text = input.value.trim();
            if (!text || !selectedSessionId) return;

            await push(ref(db, `live_chat_messages/${selectedSessionId}`), {
                senderId: 'consultant',
                text: text,
                timestamp: serverTimestamp()
            });
            input.value = '';
        };

        window.handleKey = (e) => { if (e.key === 'Enter') window.sendResponse(); };

        window.listenForMessages = (sessionId) => {
            const list = document.getElementById('consultantMessagesList');
            list.innerHTML = ''; // Clear for new session
            onChildAdded(ref(db, `live_chat_messages/${sessionId}`), (snap) => {
                const msg = snap.val();
                const div = document.createElement('div');
                div.className = `msg ${msg.senderId}`;
                div.innerText = msg.text;
                list.appendChild(div);
                list.scrollTop = list.scrollHeight;
            });
        };

        feather.replace();
    </script>
</body>
</html>
